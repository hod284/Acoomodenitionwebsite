name: Deploy to EC2

# main 브랜치에 push되면 자동으로 빌드 후 EC2 서버에 배포합니다.
# 수동 실행은 GitHub 저장소의 Actions 탭에서 "Run workflow" 버튼으로 가능합니다.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 의존성 설치
        run: npm ci

      - name: 프로덕션 빌드
        run: npm run build
        # 빌드 시점에 주입해야 하는 환경변수가 있다면 여기 env에 추가하세요.

      # ---------------------------------------------------------------
      # 아래부터는 EC2 접속 정보가 필요합니다.
      # 실제 값은 코드에 절대 넣지 않고, GitHub 저장소의
      # Settings → Secrets and variables → Actions 에서 등록한
      # Secrets를 참조합니다.
      #
      #   EC2_HOST        (필수) EC2 퍼블릭 IP 또는 도메인
      #   EC2_SSH_KEY      (필수) EC2 접속용 .pem 키 파일의 전체 내용
      #   EC2_USER         (필수) 접속 계정명, Amazon Linux는 보통 ec2-user
      #   EC2_DEPLOY_PATH  (필수) 빌드 파일을 둘 서버 경로, 예) /home/ec2-user/staynest/dist
      # ---------------------------------------------------------------

      - name: 배포 대상 디렉토리 준비 (없으면 생성)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p ${{ secrets.EC2_DEPLOY_PATH }}

      - name: 빌드 결과물을 EC2로 전송
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "dist/*"
          target: ${{ secrets.EC2_DEPLOY_PATH }}
          strip_components: 1
          overwrite: true

      - name: Nginx 재시작 (새 파일 반영)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo systemctl reload nginx
