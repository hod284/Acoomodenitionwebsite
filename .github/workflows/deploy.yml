name: Deploy to AWS (S3 + CloudFront)

# main 브랜치에 push되면 자동으로 빌드 → S3 업로드 → CloudFront 캐시 무효화까지 실행합니다.
# 수동으로 실행하고 싶을 때는 GitHub 저장소의 Actions 탭에서 "Run workflow" 버튼으로도 실행 가능합니다.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 의존성 설치
        run: npm ci

      - name: 프로덕션 빌드
        run: npm run build
        # 빌드 시점에 주입해야 하는 환경변수가 있다면 여기 env에 추가하세요.
        # 예) VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      # ---------------------------------------------------------------
      # 아래부터는 AWS 인증정보가 필요한 단계입니다.
      # 실제 값은 코드에 절대 넣지 않고, GitHub 저장소의
      # Settings → Secrets and variables → Actions 에서 등록한
      # Secrets를 참조합니다. 회사 AWS 담당자가 아래 이름으로
      # Secret을 등록해주면 그대로 동작합니다.
      #
      #   AWS_ACCESS_KEY_ID          (필수)
      #   AWS_SECRET_ACCESS_KEY      (필수)
      #   AWS_REGION                 (필수, 예: ap-northeast-2)
      #   S3_BUCKET_NAME             (필수, 예: staynest-prod)
      #   CLOUDFRONT_DISTRIBUTION_ID (선택, CloudFront 사용 시에만)
      # ---------------------------------------------------------------

      - name: AWS 자격증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: S3에 업로드
        run: |
          aws s3 sync dist/ "s3://${{ secrets.S3_BUCKET_NAME }}" --delete

      - name: CloudFront 캐시 무효화
        if: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
